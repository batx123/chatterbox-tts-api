---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chatterbox-models
  namespace: chatterbox
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chatterbox-voices
  namespace: chatterbox
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chatterbox-longtext-data
  namespace: chatterbox
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatterbox-tts
  namespace: chatterbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatterbox-tts
  template:
    metadata:
      labels:
        app: chatterbox-tts
    spec:
      containers:
        - name: chatterbox-tts
          image: localhost:32000/chatterbox-tts-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4123
          env:
            - name: PORT
              value: "4123"
            - name: HOST
              value: "0.0.0.0"
            - name: DEVICE
              value: "cuda"
            - name: EXAGGERATION
              value: "0.5"
            - name: CFG_WEIGHT
              value: "0.5"
            - name: TEMPERATURE
              value: "0.8"
            - name: MAX_CHUNK_LENGTH
              value: "280"
            - name: MAX_TOTAL_LENGTH
              value: "3000"
            - name: LONG_TEXT_DATA_DIR
              value: "/data/long_text_jobs"
            - name: LONG_TEXT_MAX_LENGTH
              value: "100000"
            - name: LONG_TEXT_CHUNK_SIZE
              value: "2500"
            - name: LONG_TEXT_SILENCE_PADDING_MS
              value: "200"
            - name: LONG_TEXT_JOB_RETENTION_DAYS
              value: "7"
            - name: LONG_TEXT_MAX_CONCURRENT_JOBS
              value: "3"
            - name: VOICE_SAMPLE_PATH
              value: "/app/voice-sample.mp3"
            - name: MODEL_CACHE_DIR
              value: "/cache"
            - name: VOICE_LIBRARY_DIR
              value: "/voices"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /cache
            - name: voices
              mountPath: /voices
            - name: longtext-data
              mountPath: /data/long_text_jobs
            - name: voice-sample
              mountPath: /app/voice-sample.mp3
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 4123
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4123
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: chatterbox-models
        - name: voices
          persistentVolumeClaim:
            claimName: chatterbox-voices
        - name: longtext-data
          persistentVolumeClaim:
            claimName: chatterbox-longtext-data
        - name: voice-sample
          hostPath:
            # UPDATE THIS PATH to match the absolute path on your host where voice-sample.mp3 lives
            # Example: /home/youruser/chatterbox-tts-api/voice-sample.mp3
            path: /home/demo/chatterbox-tts/chatterbox-tts-api/voice-sample.mp3
            type: File
      runtimeClassName: nvidia
---
apiVersion: v1
kind: Service
metadata:
  name: chatterbox-tts
  namespace: chatterbox
spec:
  selector:
    app: chatterbox-tts
  ports:
    - port: 4123
      targetPort: 4123
  type: ClusterIP
