---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatterbox-frontend
  namespace: chatterbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatterbox-frontend
  template:
    metadata:
      labels:
        app: chatterbox-frontend
    spec:
      containers:
        - name: chatterbox-frontend
          image: localhost:32000/chatterbox-tts-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /frontend-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chatterbox-frontend
  namespace: chatterbox
spec:
  selector:
    app: chatterbox-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
